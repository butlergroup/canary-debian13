name: debian13 Runtime Scan

permissions:
  contents: read

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read # for actions/checkout to fetch code
      security-events: write # for github/codeql-action/upload-sarif to upload SARIF results
      actions: read # only required for a private repository by github/codeql-action/upload-sarif to get the Action run status

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            qemu-system-x86 \
            qemu-utils \
            cloud-image-utils \
            curl \
            openssh-client \
            netcat-openbsd \
            ca-certificates

      - name: Download image
        run: |
          curl -L --retry 5 -o debian13.img \
            https://cloud.debian.org/images/cloud/trixie/latest/debian-13-nocloud-amd64.qcow2

      - name: Generate SSH key
        run: |
          ssh-keygen -t rsa -b 4096 -f id_rsa -N ""

      - name: Create cloud-init config
        run: |
          cat > user-data <<EOF
          #cloud-config
          users:
            - name: clouduser
              sudo: ALL=(ALL) NOPASSWD:ALL
              groups: sudo
              shell: /bin/bash
              ssh_authorized_keys:
                - $(cat id_rsa.pub)
          ssh_pwauth: false
          disable_root: true
          package_update: true
          packages:
            - openssh-server
          runcmd:
            - systemctl enable ssh
            - systemctl start ssh
          EOF

          cat > meta-data <<EOF
          instance-id: iid-local01
          local-hostname: debian13
          EOF

          cloud-localds seed.iso user-data meta-data

      - name: Start debian13 VM
        run: |
          qemu-system-x86_64 \
            -m 2048 \
            -smp 2 \
            -machine type=q35,accel=tcg \
            -cpu max \
            -drive file=debian13.img,format=qcow2,if=virtio \
            -drive file=seed.iso,format=raw,if=virtio \
            -boot c \
            -netdev user,id=net0,hostfwd=tcp::2222-:22 \
            -device virtio-net-pci,netdev=net0 \
            -nographic \
            -serial mon:stdio \
            > vm.log 2>&1 &

          echo $! > vm.pid

      - name: Check if port 2222 is open
        run: |
          for i in {1..60}; do
            if nc -z localhost 2222; then
              echo "✅ Port 2222 is open"
              exit 0
            fi
            echo "⏳ Port not open yet..."
            sleep 2
          done
          echo "❌ Port 2222 never opened"
          exit 1

      - name: Wait for SSH to be fully ready
        run: |
          for i in {1..120}; do
            if ssh -i id_rsa \
              -o StrictHostKeyChecking=no \
              -o ConnectTimeout=2 \
              -o BatchMode=yes \
              -p 2222 clouduser@localhost "echo ready" >/dev/null 2>&1; then
              echo "✅ SSH is fully ready"
              exit 0
            fi
            echo "⏳ Waiting for SSH..."
            sleep 2
          done
          echo "❌ SSH failed to become ready"
          exit 1

      - name: Dump VM logs
        if: failure()
        run: cat vm.log || true

      - name: Run Trivy scan inside VM
        run: |
          ssh -i id_rsa -p 2222 clouduser@localhost <<'EOF'
          set -e
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh
          sudo ./bin/trivy rootfs / \
            --scanners vuln,misconfig \
            -f sarif \
            -o /tmp/report.sarif
          EOF

      - name: Copy report from VM
        run: |
          scp -i id_rsa -P 2222 \
            -o StrictHostKeyChecking=no \
            clouduser@localhost:/tmp/report.sarif \
            report.sarif

      - name: Stop VM
        if: always()
        run: |
          kill $(cat vm.pid) || true

      - name: Upload SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: report.sarif
